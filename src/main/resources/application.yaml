server:
  port: 8080

spring:
  application:
    name: flashsale
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/flashsale?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: flashsale
    password: flashsalepw
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 500ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 200ms

flashsale:
  instance-id: ${INSTANCE_ID:local}
