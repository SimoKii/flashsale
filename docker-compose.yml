services:
  mysql:
    image: mysql:8.0
    container_name: flashsale-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: flashsale
      MYSQL_USER: flashsale
      MYSQL_PASSWORD: flashsalepw
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpw"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [flashsale-net]

  redis-master:
    image: redis:7.2
    container_name: flashsale-redis-master
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./infra/redis/master.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-master-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
    networks: [flashsale-net]

  redis-replica-1:
    image: redis:7.2
    container_name: flashsale-redis-replica-1
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./infra/redis/replica-1.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-replica-1-data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
    networks: [flashsale-net]

  redis-replica-2:
    image: redis:7.2
    container_name: flashsale-redis-replica-2
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./infra/redis/replica-2.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-replica-2-data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
    networks: [flashsale-net]

  redis-sentinel-1:
    image: redis:7.2
    container_name: flashsale-sentinel-1
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./infra/redis/sentinel-1.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    ports:
      - "26379:26379"
    networks: [flashsale-net]

  redis-sentinel-2:
    image: redis:7.2
    container_name: flashsale-sentinel-2
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./infra/redis/sentinel-2.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy
    ports:
      - "26380:26379"
    networks: [flashsale-net]

  redis-sentinel-3:
    image: redis:7.2
    container_name: flashsale-sentinel-3
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./infra/redis/sentinel-3.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy
    ports:
      - "26381:26379"
    networks: [flashsale-net]

  app-1:
    build: .
    container_name: flashsale-app-1
    platform: linux/amd64
    environment:
      INSTANCE_ID: app-1
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      REDIS_SENTINEL_NODES: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_MASTER_NAME: mymaster
    depends_on:
      mysql:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
      redis-sentinel-2:
        condition: service_started
      redis-sentinel-3:
        condition: service_started
    networks: [flashsale-net]

  app-2:
    build: .
    container_name: flashsale-app-2
    platform: linux/amd64
    environment:
      INSTANCE_ID: app-2
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      REDIS_SENTINEL_NODES: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_MASTER_NAME: mymaster
    depends_on:
      mysql:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
      redis-sentinel-2:
        condition: service_started
      redis-sentinel-3:
        condition: service_started
    networks: [flashsale-net]

  nginx:
    image: nginx:1.25-alpine
    container_name: flashsale-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app-1
      - app-2
    networks: [flashsale-net]

networks:
  flashsale-net:
    driver: bridge

volumes:
  mysql-data:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data: